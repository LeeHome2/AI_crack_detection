# AI 시설물 안전점검 — 서버 배포용 compose (8501 = 고도화·CD 자동, 복합 결함 라인)
# 로컬:  docker compose up -d --build
# 서버:  main 머지 시 CD가 git pull + rebuild.  (8502 크랙 안전판은 docker-compose.dev.yml)
# ※ 6종 복합 모델은 best.pt를 repo에 커밋(runs/detect/defect6_v2/weights/best.pt)하면
#   아래 YOLO_WEIGHTS 기본값이 자동 사용됨. 미커밋이면 config 기본(크랙 타일 모델)로 폴백.
name: crack

services:
  crack-app:
    image: ${APP_IMAGE:-crack:local}      # CD는 GHCR 이미지 태그로 주입
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crack-app
    restart: unless-stopped
    env_file:
      - path: .env                         # UPSTAGE_API_KEY, ANTHROPIC_API_KEY 등
        required: false
    environment:
      EMBED_PROVIDER: ${EMBED_PROVIDER:-solar}
      SERVICE_PORT: ${SERVICE_PORT:-8501}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5}
      # Solar 실측 분포에 맞춘 값(0.20). 0.55면 근거가 대부분 필터링돼 RAG가 사실상 꺼짐.
      RAG_MATCH_MIN_SCORE: ${RAG_MATCH_MIN_SCORE:-0.20}
      # 6종 복합 모델 경로(커밋 시 자동 사용). 파일 없으면 config가 크랙 타일 모델로 폴백.
      YOLO_WEIGHTS: ${YOLO_WEIGHTS:-/app/runs/detect/defect6_v2/weights/best.pt}
    ports:
      - "${SERVICE_PORT:-8501}:8501"
    volumes:
      - crack_chroma:/app/knowledge/chroma   # RAG 인덱스 영속 (재배포에도 유지)
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

volumes:
  crack_chroma:
